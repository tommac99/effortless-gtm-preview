<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Effortless GTM — Automate your business, intelligently.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#f5f4ef;
  --ink-2:rgba(245,244,239,0.70);
  --ink-3:rgba(245,244,239,0.45);
  --mint:#bce0c6;
  --cream:#f0eadb;
  --cream-strong:#e6dec7;
}
html,body{height:100%}
body{
  font-family:'Manrope','Inter',system-ui,sans-serif;
  background:#000;color:var(--ink-2);
  -webkit-font-smoothing:antialiased;overflow:hidden;
}

#bg-photo{position:fixed;inset:0;z-index:0;overflow:hidden}
#bg-photo img{
  width:100%;height:100%;object-fit:cover;object-position:center;
  opacity:1;filter:saturate(0.72) brightness(1.08) contrast(1.05);
}
#bg-effect{position:fixed;inset:0;z-index:1;pointer-events:none}
#bg-vignette{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:
    radial-gradient(ellipse 90% 70% at center,transparent 25%,rgba(0,0,0,0.45) 80%),
    linear-gradient(to top,rgba(0,0,0,0.55) 0%,transparent 35%);
}

/* NAV */
header.nav{
  position:fixed;top:0;left:0;right:0;z-index:50;
  height:84px;display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(28px,4vw,56px);
}
.logo-img{height:48px;width:auto;filter:drop-shadow(0 2px 12px rgba(0,0,0,0.4)) brightness(1.15)}
.cta-btn{
  padding:.8rem 1.6rem;background:var(--cream);color:#1a2a1c;
  border-radius:9999px;font-size:.92rem;font-weight:600;
  text-decoration:none;letter-spacing:.01em;
  transition:transform .15s ease,background .2s ease;
  display:inline-flex;align-items:center;gap:.4rem;
  font-family:'Manrope','Inter',sans-serif;
}
.cta-btn:hover{background:var(--cream-strong);transform:translateY(-1px)}

/* CONTENT */
main.content{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:96px 32px 64px;gap:2.5rem;pointer-events:none;
}
main.content > *{pointer-events:auto}

h1.headline{
  text-align:center;max-width:24ch;line-height:0.96;
  text-shadow:0 6px 40px rgba(0,0,0,0.55);
}
h1.headline .l1{
  display:block;
  font-family:'Manrope',sans-serif;font-weight:800;letter-spacing:-0.032em;
  font-size:clamp(2.4rem,5vw,4.2rem);color:var(--ink);
}
h1.headline .l2{
  display:block;
  font-family:'Cormorant Garamond',Georgia,serif;
  font-style:italic;font-weight:500;
  font-size:clamp(3.6rem,8vw,7.4rem);
  letter-spacing:-0.015em;
  margin-top:0.5rem;
  /* SHIMMER — gradient passes a warm-white spark through the letters */
  background:linear-gradient(
    100deg,
    #f5f4ef  20%,
    #f5f4ef  40%,
    #fff5d6  46%,
    #ffffff  50%,
    #fff5d6  54%,
    #f5f4ef  60%,
    #f5f4ef  80%
  );
  background-size:300% 100%;
  background-position:200% 0;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  /* Constant warm halo */
  filter:drop-shadow(0 6px 40px rgba(255,250,235,0.22)) drop-shadow(0 0 18px rgba(255,250,235,0.10));
  animation:shimmer 6.5s ease-in-out infinite;
}
@keyframes shimmer{
  0%   { background-position: 220% 0; }
  100% { background-position: -120% 0; }
}

.sub{
  font-family:'Manrope','Inter',sans-serif;
  font-size:1.02rem;font-weight:400;color:var(--ink-2);text-align:center;
  max-width:46ch;line-height:1.55;letter-spacing:0.005em;
}

/* GLASS FORM */
.form-glass{
  width:100%;max-width:600px;
  background:rgba(20,28,22,0.42);
  backdrop-filter:blur(30px) saturate(140%);
  -webkit-backdrop-filter:blur(30px) saturate(140%);
  border:1px solid rgba(245,244,239,0.10);
  border-radius:20px;
  padding:1.35rem 1.5rem 1.1rem;
  box-shadow:0 1px 0 rgba(255,255,255,0.05) inset,0 16px 50px rgba(0,0,0,0.35);
}
.form-glass .label{
  font-family:'Manrope',sans-serif;
  font-size:.7rem;color:var(--ink-3);font-weight:600;
  letter-spacing:0.18em;text-transform:uppercase;margin-bottom:.55rem;
}
.form-glass textarea{
  width:100%;border:none;outline:none;resize:none;background:transparent;color:var(--ink);
  font-family:'Manrope',sans-serif;font-size:1.05rem;line-height:1.5;min-height:28px;
}
.form-glass textarea::placeholder{color:var(--ink-3)}
.form-foot{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:.85rem;padding-top:.85rem;border-top:1px solid rgba(245,244,239,0.06);
  font-family:'Manrope',sans-serif;
}
.form-foot .count{font-size:.72rem;color:var(--ink-3)}
.form-foot button{
  width:38px;height:38px;border-radius:50%;
  background:var(--cream);color:#1a2a1c;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1rem;
  box-shadow:0 4px 16px rgba(240,234,219,0.18);
  transition:transform .15s ease, background .2s ease;
}
.form-foot button:hover{background:var(--cream-strong);transform:scale(1.05)}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
canvas{display:block;width:100%!important;height:100%!important}
</style>
</head>
<body>

<div id="bg-photo"><img src="brand/hero-bg.png" alt="" /></div>
<div id="bg-effect"></div>
<div id="bg-vignette"></div>

<header class="nav">
  <a href="#"><img class="logo-img" src="brand/logo-mint.svg" alt="Effortless GTM" /></a>
  <a href="https://calendar.notion.so/meet/etienne_frelechoz/free-assessment" target="_blank" class="cta-btn">Book a call →</a>
</header>

<main class="content">
  <h1 class="headline">
    <span class="l1">Automate your business,</span>
    <span class="l2">intelligently.</span>
  </h1>
  <p class="sub">5 minutes to your annual savings.</p>

  <div class="form-glass">
    <div class="label">What do you want to automate?</div>
    <textarea placeholder="Describe the process step by step. The more detail, the better the match." rows="1"></textarea>
    <div class="form-foot">
      <span class="count">Step 1 of 4</span>
      <button>→</button>
    </div>
  </div>
</main>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three'

const effectEl = document.getElementById('bg-effect')
const dpr = Math.min(window.devicePixelRatio || 1, 2)

const canvas = document.createElement('canvas')
canvas.style.position = 'absolute'
canvas.style.inset = '0'
canvas.style.mixBlendMode = 'screen'
effectEl.appendChild(canvas)

const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false })
renderer.setPixelRatio(Math.min(dpr, 1.5))

const scene = new THREE.Scene()
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1)
const geom = new THREE.PlaneGeometry(2, 2)

const mat = new THREE.ShaderMaterial({
  transparent: true,
  blending: THREE.AdditiveBlending,
  uniforms: {
    uT: { value: 0 },
    uRes: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  },
  vertexShader: `void main(){gl_Position = vec4(position, 1.0);}`,
  fragmentShader: `
    precision highp float;
    uniform float uT;
    uniform vec2 uRes;
    void main(){
      vec2 uv = gl_FragCoord.xy / uRes;
      float a1 = 0.7;
      float p1 = uv.x * cos(a1) + uv.y * sin(a1);
      float speed = 0.075;
      float w = sin(p1 * 2.8 - uT * speed * 1.5) * 0.5 + 0.5;
      float beam = smoothstep(0.55, 0.65, w) * smoothstep(0.95, 0.7, w);
      float w2 = sin(p1 * 1.5 + uT * speed * 0.8 + 1.5) * 0.5 + 0.5;
      float ambient = smoothstep(0.55, 0.7, w2) * smoothstep(0.92, 0.78, w2) * 0.5;
      vec3 col = vec3(1.0, 0.97, 0.90) * (beam + ambient) * 0.20;
      gl_FragColor = vec4(col, beam * 0.20 + ambient * 0.12);
    }
  `,
})
scene.add(new THREE.Mesh(geom, mat))

function size(){
  const w = window.innerWidth, h = window.innerHeight
  renderer.setSize(w, h, false)
  mat.uniforms.uRes.value.set(w, h)
}
size()
window.addEventListener('resize', size)

let start = performance.now()
function frame(){
  mat.uniforms.uT.value = (performance.now() - start) / 1000
  renderer.render(scene, camera)
  requestAnimationFrame(frame)
}
frame()
</script>
</body>
</html>
