<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

html,body{height:100%}
body{

/* ── BG LAYERS ── */
#bg-photo{
  position:fixed;inset:0;z-index:0;
  display:flex;align-items:center;justify-content:center;
}
#bg-photo img{
  width:100%;height:100%;object-fit:cover;object-position:center;
  opacity:0.7;filter:blur(2px) brightness(1.0);
  transition:opacity .6s ease,filter .6s ease;
}
#bg-effect{position:fixed;inset:0;z-index:1;pointer-events:none}
#bg-effect>*{position:absolute;inset:0;width:100%;height:100%}
#bg-vignette{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:
    radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.4) 80%),
    linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 40%);
}

/* ── NAV ── */
header.nav{
  position:fixed;top:0;left:0;right:340px;z-index:50;
  height:80px;display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(24px,4vw,48px);
}
.logo-img{height:42px;width:auto;filter:drop-shadow(0 2px 14px rgba(188,224,198,0.3))}
.cta-btn{
  padding:.7rem 1.5rem;
  background:var(--mint);color:#0a1a0e;
  border-radius:9999px;font-size:.92rem;font-weight:600;
  text-decoration:none;letter-spacing:0.01em;
  transition:transform .15s ease,box-shadow .2s ease,background .2s ease;
  box-shadow:0 6px 24px rgba(188,224,198,0.20);
  display:inline-flex;align-items:center;gap:.4rem;
}
.cta-btn:hover{background:var(--mint-strong);transform:translateY(-1px)}

/* ── CONTENT ── */
main.content{
  position:fixed;inset:0;right:340px;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:96px 32px 48px;gap:2.5rem;pointer-events:none;
}
main.content > *{pointer-events:auto}

h1.headline{
  font-family:'Inter',sans-serif;font-weight:700;letter-spacing:-0.03em;
  font-size:clamp(2.5rem,5.5vw,4.5rem);line-height:1;text-align:center;
  color:var(--ink);max-width:18ch;
  text-shadow:0 4px 30px rgba(0,0,0,0.5);
}
h1.headline em{
  font-family:'Instrument Serif',Georgia,serif;font-style:italic;font-weight:400;
  background:linear-gradient(135deg,var(--mint) 0%,var(--mint-strong) 50%,var(--plum) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  letter-spacing:-0.02em;
}

.form-mock{
  width:100%;max-width:560px;
  background:rgba(8,18,12,0.65);
  backdrop-filter:blur(28px) saturate(140%);
  -webkit-backdrop-filter:blur(28px) saturate(140%);
  border:1px solid rgba(188,224,198,0.14);
  border-radius:20px;
  padding:1.25rem 1.5rem 1rem;
  box-shadow:0 16px 60px rgba(0,0,0,0.4);
}
.form-mock .label{
  font-size:.72rem;color:var(--ink-3);font-weight:600;
  letter-spacing:0.16em;text-transform:uppercase;margin-bottom:0.5rem;
}
.form-mock textarea{
  width:100%;border:none;outline:none;resize:none;
  background:transparent;color:var(--ink);
  font-family:inherit;font-size:1.05rem;line-height:1.5;

}
.form-mock textarea::placeholder{color:var(--ink-3)}
.form-mock-foot{

}
.form-mock-foot .count{font-size:.72rem;color:var(--ink-3)}

/* ── PICKER ── */
aside.picker{

.picker-list{

/* ── CONCEPT-SPECIFIC STYLES ── */
/* 1. Mesh Gradient */
.c-mesh-blob{
  position:absolute;border-radius:50%;filter:blur(80px);
  mix-blend-mode:screen;will-change:transform;
}
@keyframes mesh1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(8%,-6%) scale(1.15)}}
@keyframes mesh2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-10%,8%) scale(0.9)}}
@keyframes mesh3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(6%,12%) scale(1.1)}}

/* 2. Breathing Glow */
.c-glow-pulse{
  position:absolute;inset:-20%;
  background:radial-gradient(circle at 50% 55%,rgba(188,224,198,0.32) 0%,rgba(134,200,154,0.18) 18%,transparent 50%);
  animation:glowBreath 7s ease-in-out infinite;
}
@keyframes glowBreath{0%,100%{transform:scale(1);opacity:0.85}50%{transform:scale(1.10);opacity:1}}

/* 3. Aurora */
.c-aurora-curtain{
  position:absolute;top:-10%;bottom:-10%;width:30%;
  filter:blur(60px);will-change:transform;mix-blend-mode:screen;
}
@keyframes aurora1{0%,100%{transform:translateX(-15%) skewX(-8deg)}50%{transform:translateX(15%) skewX(8deg)}}
@keyframes aurora2{0%,100%{transform:translateX(20%) skewX(6deg)}50%{transform:translateX(-20%) skewX(-6deg)}}
@keyframes aurora3{0%,100%{transform:translateX(0%) skewX(-4deg)}50%{transform:translateX(10%) skewX(4deg)}}

/* 4. Light Orbs */
.c-orb{
  position:absolute;border-radius:50%;filter:blur(50px);
  mix-blend-mode:screen;will-change:transform;
}
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,40px)}}
@keyframes orb3{0%,100%{transform:translate(0,0)}50%{transform:translate(25px,30px)}}
@keyframes orb4{0%,100%{transform:translate(0,0)}50%{transform:translate(-35px,-25px)}}
@keyframes orb5{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-40px)}}
@keyframes orb6{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,35px)}}

/* 6. Ken Burns */
.c-kenburns{position:absolute;inset:0;animation:kenburns 18s ease-in-out infinite alternate}
@keyframes kenburns{from{transform:scale(1.0)}to{transform:scale(1.06)}}

/* 7. Light Rays */
.c-rays{
  position:absolute;inset:-20%;
  background:conic-gradient(from 90deg at 50% 100%,
    transparent 0deg, rgba(188,224,198,0.10) 8deg, transparent 16deg,
    transparent 30deg, rgba(188,224,198,0.06) 38deg, transparent 46deg,
    transparent 70deg, rgba(200,184,229,0.08) 80deg, transparent 90deg,
    transparent 270deg, rgba(188,224,198,0.08) 280deg, transparent 290deg,
    transparent 320deg, rgba(200,184,229,0.10) 330deg, transparent 340deg,
    transparent 360deg);
  animation:raysRotate 90s linear infinite;
  transform-origin:50% 100%;
  mix-blend-mode:screen;
}
@keyframes raysRotate{from{transform:rotate(-15deg)}to{transform:rotate(15deg)}}

canvas{display:block;width:100%!important;height:100%!important}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

<script type="module">
import * as THREE from 'three'

const photoEl = document.getElementById('bg-photo')
const effectEl = document.getElementById('bg-effect')

const DESC = {
  1: 'Three big radial gradient blobs drifting slowly. Apple Vision Pro energy. Photo at 70%.',
  2: 'Single large mint glow that breathes slowly. Most calm, most minimal motion.',
  3: 'Soft vertical light bands swaying like northern lights. Mint + plum.',
  4: 'Six large blurred light spheres drift gently in 3D space. More premium feel than particles.',
  5: 'Thin glowing trails flow through a curl noise field. Organic, calm, scientific.',
  6: 'Just the photo, very slowly zooming + a breathing vignette. Almost no motion. Maximum focus on content.',
  7: 'Slow conic god-rays sweeping like sun through forest canopy. Mint + plum.',
  8: 'WebGL fragment shader with fluid noise distortion. Huly territory — high motion, high impact.',
  9: 'Flowing plasma waves in brand colours. Heavy motion. Most "alive" of the options.',
  10: 'Replaces the photo entirely — actual 3D rendered pills, slowly rotating. The signature move.',
}

let currentCleanup = null
let currentN = null
let dpr = Math.min(window.devicePixelRatio || 1, 2)

function clearEffect(){
  if(currentCleanup){ currentCleanup(); currentCleanup = null }
  effectEl.innerHTML = ''
}

function setPhoto({opacity=0.7, blur=2, brightness=1.0, hide=false}={}){
  const img = photoEl.querySelector('img')
  if(!img) return
  img.style.opacity = hide ? '0' : String(opacity)
  img.style.filter = `blur(${blur}px) brightness(${brightness})`
}

// ── CONCEPT 1: Mesh Gradient Drift ────────────────────────────────
function c1(){
  setPhoto({opacity:0.55, blur:3})
  effectEl.innerHTML = `
    <div class="c-mesh-blob" style="
      width:60vw;height:60vw;top:-15%;left:-10%;
      background:radial-gradient(circle,rgba(188,224,198,0.45) 0%,transparent 65%);
      animation:mesh1 28s ease-in-out infinite;"></div>
    <div class="c-mesh-blob" style="
      width:55vw;height:55vw;top:30%;right:-15%;
      background:radial-gradient(circle,rgba(200,184,229,0.38) 0%,transparent 65%);
      animation:mesh2 32s ease-in-out infinite;"></div>
    <div class="c-mesh-blob" style="
      width:50vw;height:50vw;bottom:-20%;left:25%;
      background:radial-gradient(circle,rgba(134,200,154,0.40) 0%,transparent 65%);
      animation:mesh3 24s ease-in-out infinite;"></div>`
  return ()=>{}
}

// ── CONCEPT 2: Breathing Glow ─────────────────────────────────────
function c2(){
  setPhoto({opacity:0.7, blur:2})
  effectEl.innerHTML = `<div class="c-glow-pulse"></div>`
  return ()=>{}
}

// ── CONCEPT 3: Aurora Curtains ────────────────────────────────────
function c3(){
  setPhoto({opacity:0.55, blur:2})
  effectEl.innerHTML = `
    <div class="c-aurora-curtain" style="left:5%;background:linear-gradient(180deg,rgba(188,224,198,0.55) 0%,rgba(188,224,198,0.15) 50%,transparent 100%);animation:aurora1 18s ease-in-out infinite"></div>
    <div class="c-aurora-curtain" style="left:38%;background:linear-gradient(180deg,rgba(200,184,229,0.45) 0%,rgba(200,184,229,0.10) 60%,transparent 100%);animation:aurora2 22s ease-in-out infinite"></div>
    <div class="c-aurora-curtain" style="right:5%;background:linear-gradient(180deg,rgba(134,200,154,0.50) 0%,rgba(134,200,154,0.12) 55%,transparent 100%);animation:aurora3 20s ease-in-out infinite"></div>`
  return ()=>{}
}

// ── CONCEPT 4: Drifting Light Orbs ────────────────────────────────
function c4(){
  setPhoto({opacity:0.55, blur:2})
  effectEl.innerHTML = `
    <div class="c-orb" style="width:240px;height:240px;top:8%;left:12%;background:radial-gradient(circle,rgba(188,224,198,0.65) 0%,transparent 70%);animation:orb1 14s ease-in-out infinite"></div>
    <div class="c-orb" style="width:180px;height:180px;top:60%;left:8%;background:radial-gradient(circle,rgba(200,184,229,0.55) 0%,transparent 70%);animation:orb2 18s ease-in-out infinite"></div>
    <div class="c-orb" style="width:300px;height:300px;top:25%;right:5%;background:radial-gradient(circle,rgba(134,200,154,0.50) 0%,transparent 70%);animation:orb3 16s ease-in-out infinite"></div>
    <div class="c-orb" style="width:220px;height:220px;bottom:5%;right:18%;background:radial-gradient(circle,rgba(188,224,198,0.55) 0%,transparent 70%);animation:orb4 20s ease-in-out infinite"></div>
    <div class="c-orb" style="width:160px;height:160px;top:45%;left:42%;background:radial-gradient(circle,rgba(200,184,229,0.40) 0%,transparent 70%);animation:orb5 22s ease-in-out infinite"></div>
    <div class="c-orb" style="width:280px;height:280px;bottom:-5%;left:35%;background:radial-gradient(circle,rgba(134,200,154,0.45) 0%,transparent 70%);animation:orb6 24s ease-in-out infinite"></div>`
  return ()=>{}
}

// ── CONCEPT 5: Curl Noise Trails ──────────────────────────────────
function c5(){
  setPhoto({opacity:0.45, blur:3})
  const canvas = document.createElement('canvas')
  effectEl.appendChild(canvas)
  const ctx = canvas.getContext('2d')

  function size(){
    canvas.width = window.innerWidth * dpr
    canvas.height = window.innerHeight * dpr
    canvas.style.width = '100%'
    canvas.style.height = '100%'
  }
  size()
  const onResize = () => size()
  window.addEventListener('resize', onResize)

  const N = 80
  const trails = []
  for(let i=0;i<N;i++){
    trails.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      hue: Math.random() < 0.55 ? 'mint' : 'plum',
      life: Math.random() * 600,
    })
  }

  function noise(x, y){
    return Math.sin(x * 0.001 + y * 0.0017) * Math.cos(y * 0.0009 - x * 0.0011)
  }
  function curl(x, y){
    const e = 30
    const n1 = noise(x, y + e), n2 = noise(x, y - e)
    const n3 = noise(x + e, y), n4 = noise(x - e, y)
    return { dx: (n1 - n2) / (2 * e) * 800, dy: -(n3 - n4) / (2 * e) * 800 }
  }

  let rafId
  function draw(){
    ctx.fillStyle = 'rgba(0,0,0,0.04)'
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    ctx.globalCompositeOperation = 'screen'
    for(const t of trails){
      const c = curl(t.x, t.y)
      const nx = t.x + c.dx
      const ny = t.y + c.dy
      ctx.strokeStyle = t.hue === 'mint'
        ? 'rgba(188,224,198,0.55)'
        : 'rgba(200,184,229,0.45)'
      ctx.lineWidth = 1.4 * dpr
      ctx.beginPath()
      ctx.moveTo(t.x, t.y)
      ctx.lineTo(nx, ny)
      ctx.stroke()
      t.x = nx; t.y = ny; t.life++
      if(t.x < 0 || t.x > canvas.width || t.y < 0 || t.y > canvas.height || t.life > 1200){
        t.x = Math.random() * canvas.width
        t.y = Math.random() * canvas.height
        t.life = 0
      }
    }
    ctx.globalCompositeOperation = 'source-over'
    rafId = requestAnimationFrame(draw)
  }
  draw()

  return () => {
    cancelAnimationFrame(rafId)
    window.removeEventListener('resize', onResize)
  }
}

// ── CONCEPT 6: Ken Burns Photo ────────────────────────────────────
function c6(){
  setPhoto({opacity:0.85, blur:1.5})
  effectEl.innerHTML = `<div class="c-kenburns"><div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 60%,rgba(188,224,198,0.20) 0%,transparent 55%);animation:glowBreath 9s ease-in-out infinite"></div></div>`
  return ()=>{}
}

// ── CONCEPT 7: Light Rays ─────────────────────────────────────────
function c7(){
  setPhoto({opacity:0.6, blur:2})
  effectEl.innerHTML = `<div class="c-rays"></div>`
  return ()=>{}
}

// ── CONCEPT 8: Liquid Noise Shader (WebGL) ────────────────────────
function c8(){
  setPhoto({opacity:0.35, blur:3})
  const canvas = document.createElement('canvas')
  effectEl.appendChild(canvas)
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false })
  renderer.setPixelRatio(Math.min(dpr, 1.5))

  const scene = new THREE.Scene()
  const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1)
  const geom = new THREE.PlaneGeometry(2,2)
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    uniforms: {
      uT:{value:0},
      uRes:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)},
      uMouse:{value:new THREE.Vector2(0.5,0.5)},
    },
    vertexShader: `void main(){gl_Position=vec4(position,1.0);}`,
    fragmentShader: `
      precision highp float;
      uniform float uT;
      uniform vec2 uRes;
      uniform vec2 uMouse;
      vec3 mint=vec3(0.738,0.878,0.776);
      vec3 plum=vec3(0.784,0.722,0.898);
      vec3 dark=vec3(0.0,0.05,0.025);
      vec2 hash22(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return -1.0+2.0*fract(sin(p)*43758.5453123);}
      float noise(vec2 p){
        vec2 i=floor(p);vec2 f=fract(p);vec2 u=f*f*(3.0-2.0*f);
        return mix(mix(dot(hash22(i+vec2(0,0)),f-vec2(0,0)),dot(hash22(i+vec2(1,0)),f-vec2(1,0)),u.x),
                   mix(dot(hash22(i+vec2(0,1)),f-vec2(0,1)),dot(hash22(i+vec2(1,1)),f-vec2(1,1)),u.x),u.y);
      }
      float fbm(vec2 p){float v=0.0;float a=0.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=0.55;}return v;}
      void main(){
        vec2 uv=(gl_FragCoord.xy-0.5*uRes)/min(uRes.x,uRes.y);
        float t=uT*0.06;
        vec2 q=vec2(fbm(uv*1.2+vec2(t,0.0)),fbm(uv*1.2+vec2(0.0,t*0.7)));
        vec2 r=vec2(fbm(uv*1.5+q+vec2(1.7,9.2)+t),fbm(uv*1.5+q+vec2(8.3,2.8)-t));
        float f=fbm(uv*1.5+r);
        vec3 col=mix(dark,mint,smoothstep(0.0,0.7,f));
        col=mix(col,plum,smoothstep(0.4,1.0,length(r)));
        col*=0.85+0.3*fbm(uv*4.0+t);
        float alpha=smoothstep(0.0,0.5,f)*0.55;
        gl_FragColor=vec4(col,alpha);
      }`
  })
  const mesh = new THREE.Mesh(geom, mat)
  scene.add(mesh)

  function size(){
    const w = window.innerWidth, h = window.innerHeight
    renderer.setSize(w, h, false)
    mat.uniforms.uRes.value.set(w, h)
  }
  size()
  const onResize = () => size()
  window.addEventListener('resize', onResize)

  let rafId, start = performance.now()
  function frame(){
    const t = (performance.now() - start) / 1000
    mat.uniforms.uT.value = t
    renderer.render(scene, camera)
    rafId = requestAnimationFrame(frame)
  }
  frame()

  return () => {
    cancelAnimationFrame(rafId)
    window.removeEventListener('resize', onResize)
    renderer.dispose()
    geom.dispose()
    mat.dispose()
  }
}

// ── CONCEPT 9: Plasma Field (2D) ──────────────────────────────────
function c9(){
  setPhoto({opacity:0.4, blur:3})
  const canvas = document.createElement('canvas')
  effectEl.appendChild(canvas)
  const ctx = canvas.getContext('2d')
  const W_SCALE = 0.25 // downsample for performance

  function size(){
    canvas.width = Math.floor(window.innerWidth * W_SCALE)
    canvas.height = Math.floor(window.innerHeight * W_SCALE)
    canvas.style.width = '100%'
    canvas.style.height = '100%'
    canvas.style.imageRendering = 'auto'
  }
  size()
  const onResize = () => size()
  window.addEventListener('resize', onResize)

  let rafId, t = 0
  function draw(){
    t += 0.012
    const img = ctx.createImageData(canvas.width, canvas.height)
    for(let y = 0; y < canvas.height; y++){
      for(let x = 0; x < canvas.width; x++){
        const u = x / canvas.width
        const v = y / canvas.height
        const a = Math.sin((u * 4 + t))
        const b = Math.sin((v * 4 + t * 1.3))
        const c = Math.sin((u * 4 + v * 4 + t * 0.8))
        const d = Math.sin(Math.sqrt(((u-0.5)*4)**2 + ((v-0.5)*4)**2) + t * 1.1)
        const val = (a + b + c + d) / 4 // -1..1
        const norm = (val + 1) / 2     // 0..1
        // Map to mint→plum gradient
        const r = Math.floor(188 * (1 - norm) + 200 * norm)
        const g = Math.floor(224 * (1 - norm) + 184 * norm)
        const blue = Math.floor(198 * (1 - norm) + 229 * norm)
        const alpha = Math.floor(80 + 100 * norm)
        const idx = (y * canvas.width + x) * 4
        img.data[idx] = r
        img.data[idx+1] = g
        img.data[idx+2] = blue
        img.data[idx+3] = alpha
      }
    }
    ctx.putImageData(img, 0, 0)
    rafId = requestAnimationFrame(draw)
  }
  draw()

  return () => {
    cancelAnimationFrame(rafId)
    window.removeEventListener('resize', onResize)
  }
}

// ── CONCEPT 10: 3D Pill Sculpture ─────────────────────────────────
function c10(){
  setPhoto({hide:true})
  const canvas = document.createElement('canvas')
  effectEl.appendChild(canvas)
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true })
  renderer.setPixelRatio(Math.min(dpr, 1.5))
  renderer.toneMapping = THREE.ACESFilmicToneMapping
  renderer.toneMappingExposure = 1.0

  const scene = new THREE.Scene()
  scene.background = new THREE.Color(0x010504)

  const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100)
  camera.position.set(0, 0, 8)

  // Lights
  const ambient = new THREE.AmbientLight(0x1a3a26, 0.5)
  scene.add(ambient)
  const key = new THREE.DirectionalLight(0xbce0c6, 1.6)
  key.position.set(-3, 4, 5)
  scene.add(key)
  const rim = new THREE.DirectionalLight(0x86c89a, 0.8)
  rim.position.set(4, -2, 3)
  scene.add(rim)
  const fill = new THREE.PointLight(0xc8b8e5, 0.4, 20)
  fill.position.set(2, -3, 4)
  scene.add(fill)

  const mat = new THREE.MeshStandardMaterial({
    color: 0xbce0c6,
    roughness: 0.55,
    metalness: 0.05,
  })

  // Group of pills + sphere
  const group = new THREE.Group()
  scene.add(group)

  // Use CapsuleGeometry for pill shapes
  // Stacked sculpture: 3 pills + 1 sphere
  function pill(length, radius){
    const g = new THREE.CapsuleGeometry(radius, length, 8, 20)
    const m = new THREE.Mesh(g, mat)
    m.rotation.z = Math.PI / 2 // horizontal
    return m
  }

  const p1 = pill(2.0, 0.55); p1.position.set(-0.2, 1.5, 0)
  const p2 = pill(2.4, 0.55); p2.position.set(0.0, 0.2, 0)
  const p3 = pill(1.8, 0.55); p3.position.set(-0.4, -1.1, 0)
  const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.55, 24, 18), mat)
  sphere.position.set(1.5, -1.1, 0)

  group.add(p1, p2, p3, sphere)
  group.rotation.x = -0.05
  group.rotation.y = 0.15

  function size(){
    const w = window.innerWidth, h = window.innerHeight
    renderer.setSize(w, h, false)
    camera.aspect = w / h
    camera.updateProjectionMatrix()
  }
  size()
  const onResize = () => size()
  window.addEventListener('resize', onResize)

  let mx = 0, my = 0
  const onMouse = (e) => {
    mx = (e.clientX / window.innerWidth - 0.5) * 0.3
    my = (e.clientY / window.innerHeight - 0.5) * 0.15
  }
  window.addEventListener('mousemove', onMouse)

  let rafId, start = performance.now()
  function frame(){
    const t = (performance.now() - start) / 1000
    group.rotation.y = 0.15 + Math.sin(t * 0.18) * 0.15 + mx
    group.rotation.x = -0.05 + Math.cos(t * 0.12) * 0.06 + my
    renderer.render(scene, camera)
    rafId = requestAnimationFrame(frame)
  }
  frame()

  return () => {
    cancelAnimationFrame(rafId)
    window.removeEventListener('resize', onResize)
    window.removeEventListener('mousemove', onMouse)
    renderer.dispose()
    scene.traverse(o => {
      if(o.geometry) o.geometry.dispose()
      if(o.material) o.material.dispose()
    })
  }
}

const CONCEPTS = {1:c1, 2:c2, 3:c3, 4:c4, 5:c5, 6:c6, 7:c7, 8:c8, 9:c9, 10:c10}

function pick(n){
  clearEffect()
  currentN = n
  currentCleanup = CONCEPTS[n]()
  document.querySelectorAll('.picker-list button').forEach(b => {
    b.classList.toggle('active', b.dataset.c === String(n))
  })
  document.getElementById('picker-desc').textContent = DESC[n]
}

document.querySelectorAll('.picker-list button').forEach(b => {
  b.addEventListener('click', () => pick(Number(b.dataset.c)))
})

// keyboard arrows
window.addEventListener('keydown', e => {
  if(e.key === 'ArrowDown' || e.key === 'ArrowRight'){
    e.preventDefault()
    pick(currentN === 10 ? 1 : (currentN || 0) + 1)
  } else if(e.key === 'ArrowUp' || e.key === 'ArrowLeft'){
    e.preventDefault()
    pick(currentN === 1 ? 10 : (currentN || 2) - 1)
  } else if(/^[1-9]$/.test(e.key)){
    pick(Number(e.key))
  } else if(e.key === '0'){
    pick(10)
  }
})

// Start on concept 1
pick(1)
